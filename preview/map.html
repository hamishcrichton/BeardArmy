<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BeardMeatsFood – Map</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,400&display=swap" />
    <link rel="stylesheet" href="assets/app.css" />
    <style>
      #map { width: 100%; height: 540px; border-radius: var(--bmf-radius-md); }
      .map-card { position: relative; }
      .map-legend { position: absolute; bottom: 26px; left: 26px; background: rgba(26,26,26,.85); color: var(--bmf-color-text); border: 1px solid #ffffff2e; border-radius: var(--bmf-radius-md); box-shadow: var(--bmf-shadow-2); padding: var(--bmf-space-2) var(--bmf-space-3); display: flex; gap: var(--bmf-space-3); font-size: .75rem; flex-wrap: wrap; -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }
      .controls { display: flex; gap: var(--bmf-space-3); align-items: center; flex-wrap: wrap; margin-bottom: var(--bmf-space-4); }
      #world { width: 100%; height: auto; display: block; }
      .world-legend { display: flex; gap: var(--bmf-space-4); font-size: .75rem; color: var(--bmf-color-text-muted); margin-top: var(--bmf-space-2); flex-wrap: wrap; }
      .maplibregl-popup-content { background: var(--surface); color: var(--bmf-color-text); font-family: var(--bmf-font-sans); border-radius: 6px; box-shadow: var(--bmf-shadow-3); }
      .maplibregl-popup-anchor-bottom .maplibregl-popup-tip { border-top-color: var(--surface); }
      .maplibregl-popup-anchor-top .maplibregl-popup-tip { border-bottom-color: var(--surface); }
      .maplibregl-popup-anchor-left .maplibregl-popup-tip { border-right-color: var(--surface); }
      .maplibregl-popup-anchor-right .maplibregl-popup-tip { border-left-color: var(--surface); }
      .maplibregl-popup-close-button { color: var(--bmf-color-text); font-size: 16px; }
      .popup-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; display: block; margin-bottom: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Map</h1>
      <div class="sub">Every venue he's eaten at (or against) — click a pin for the story.</div>

      <div class="controls" id="controls">
        <button class="fbtn active" data-filter="all">All</button>
        <button class="fbtn" data-filter="success">Wins</button>
        <button class="fbtn" data-filter="failure">Losses</button>
        <button class="fbtn" data-filter="unknown">Pending</button>
      </div>

      <div class="card map-card">
        <div id="map"></div>
        <div class="map-legend">
          <span class="chip"><span class="swatch" style="background:var(--win)"></span>Win</span>
          <span class="chip"><span class="swatch" style="background:var(--loss)"></span>Loss</span>
          <span class="chip"><span class="swatch" style="background:var(--unknown)"></span>Verdict pending</span>
          <span class="chip"><span class="swatch" style="background:#f8f8f8"></span>Special (not a challenge)</span>
        </div>
      </div>

      <div class="card">
        <h3>Countries visited <span class="muted" id="worldCount" style="font-weight:400"></span></h3>
        <svg id="world" viewBox="0 0 960 430" role="img" aria-label="World map shaded by number of challenges per country"></svg>
        <div class="world-legend">
          <span class="chip"><span class="swatch" style="background:#14654a"></span>1–4 challenges</span>
          <span class="chip"><span class="swatch" style="background:#00915d"></span>5–49</span>
          <span class="chip"><span class="swatch" style="background:#00d084"></span>50+</span>
          <span class="chip"><span class="swatch" style="background:rgba(255,255,255,.05);border:1px solid #ffffff2e"></span>Not yet visited</span>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
    <script src="assets/config.js"></script>
    <script src="assets/app.js"></script>
    <script>
      BMF.nav('map');
      const { COLORS, esc, yt, cleanTitle, fmtDate, countryName, cuisineLabel, isChallenge } = BMF;
      const state = { features: [], rows: [], map: null, filter: 'all' };

      function matches(p) {
        if (state.filter === 'all') return true;
        // "Pending" means undecided TRUE challenges — specials never have a verdict
        if (state.filter === 'unknown') return p.kind !== 'special' && (p.result || 'unknown') === 'unknown';
        return (p.result || 'unknown') === state.filter;
      }

      function filteredFeatures() {
        return state.features.filter(f => matches(f.properties));
      }

      function applyFilters() {
        if (!state.map || !state.map.getSource('challenges')) return;
        state.map.getSource('challenges').setData({ type: 'FeatureCollection', features: filteredFeatures() });
      }

      function popupHtml(p) {
        const special = p.kind === 'special';
        const label = special ? 'SPECIAL — not a challenge'
          : p.result === 'success' ? 'WIN'
          : p.result === 'failure' ? 'LOSS' : 'VERDICT PENDING';
        const labelColor = special ? 'var(--bmf-color-text)'
          : p.result === 'success' ? 'var(--win-text)'
          : p.result === 'failure' ? 'var(--loss-text)' : 'var(--unknown-text)';
        const thumb = p.thumbnail_url
          ? `<img class="popup-thumb" src="${esc(p.thumbnail_url)}" alt="" loading="lazy" />` : '';
        return `
          <div style="min-width:220px;max-width:280px">
            ${thumb}
            <div style="font-weight:700">${esc(p.restaurant || cleanTitle(p.title))}</div>
            <div style="opacity:.7">${esc([p.city, countryName(p.country_code)].filter(Boolean).join(', '))}</div>
            <div style="opacity:.85;margin:.2rem 0">${esc(cuisineLabel(p.cuisine))} · ${fmtDate(p.date_attempted)}</div>
            <div style="margin-bottom:.2rem"><b style="color:${labelColor}">${label}</b>${p.trip_name ? ' · ' + esc(p.trip_name) : ''}</div>
            <a href="${yt(p.video_id)}" target="_blank" rel="noopener">Watch on YouTube →</a>
          </div>`;
      }

      function initMap(key) {
        const styleUrl = `https://api.maptiler.com/maps/streets-v2-dark/style.json?key=${encodeURIComponent(key)}`;
        const map = new maplibregl.Map({ container: 'map', style: styleUrl, center: [-20, 40], zoom: 1.8 });
        state.map = map;
        map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');
        map.on('load', () => {
          map.addSource('challenges', {
            type: 'geojson',
            data: { type: 'FeatureCollection', features: filteredFeatures() },
            cluster: true, clusterRadius: 42, clusterMaxZoom: 9
          });
          map.addLayer({ id: 'clusters', type: 'circle', source: 'challenges', filter: ['has', 'point_count'], paint: {
            'circle-color': '#4b5563', 'circle-opacity': .85,
            'circle-radius': ['step', ['get', 'point_count'], 14, 25, 20, 100, 26],
            'circle-stroke-width': 2, 'circle-stroke-color': '#1a1a1a'
          }});
          map.addLayer({ id: 'cluster-count', type: 'symbol', source: 'challenges', filter: ['has', 'point_count'],
            layout: { 'text-field': ['get', 'point_count_abbreviated'], 'text-size': 12 }, paint: { 'text-color': '#ffffff' }});
          map.addLayer({ id: 'points', type: 'circle', source: 'challenges', filter: ['!', ['has', 'point_count']], paint: {
            'circle-radius': 6,
            // specials get a distinct white pin (they carry no verdict); popup + legend name it
            'circle-color': ['case', ['==', ['get', 'kind'], 'special'], '#f8f8f8',
              ['match', ['get', 'result'], 'success', COLORS.success, 'failure', COLORS.failure, COLORS.unknown]],
            'circle-stroke-width': 1.5, 'circle-stroke-color': '#1a1a1a'
          }});
          map.on('click', 'clusters', async (e) => {
            const f = map.queryRenderedFeatures(e.point, { layers: ['clusters'] })[0];
            const zoom = await map.getSource('challenges').getClusterExpansionZoom(f.properties.cluster_id);
            map.easeTo({ center: f.geometry.coordinates, zoom });
          });
          map.on('click', 'points', (e) => {
            const f = e.features && e.features[0];
            if (!f) return;
            new maplibregl.Popup({ closeButton: true }).setLngLat(e.lngLat).setHTML(popupHtml(f.properties)).addTo(map);
          });
          ['clusters', 'points'].forEach(l => {
            map.on('mouseenter', l, () => map.getCanvas().style.cursor = 'pointer');
            map.on('mouseleave', l, () => map.getCanvas().style.cursor = '');
          });
        });
      }

      /* ---- filters ---- */
      document.getElementById('controls').addEventListener('click', (e) => {
        const btn = e.target.closest('.fbtn[data-filter]');
        if (!btn) return;
        document.querySelectorAll('.fbtn[data-filter]').forEach(b => b.classList.toggle('active', b === btn));
        state.filter = btn.dataset.filter;
        applyFilters();
      });

      /* ---- countries visited (SVG choropleth; true challenges only) ---- */
      const A2_NAME = {
        GB: 'United Kingdom', US: 'United States of America', IE: 'Ireland', DE: 'Germany',
        NL: 'Netherlands', BE: 'Belgium', FR: 'France', ES: 'Spain', IT: 'Italy', AT: 'Austria',
        CZ: 'Czechia', PL: 'Poland', SE: 'Sweden', CA: 'Canada', AU: 'Australia',
        NZ: 'New Zealand', AE: 'United Arab Emirates', SG: 'Singapore', TH: 'Thailand',
        CH: 'Switzerland', PT: 'Portugal', MX: 'Mexico', JP: 'Japan', DK: 'Denmark',
        NO: 'Norway', FI: 'Finland', IS: 'Iceland', DO: 'Dominican Republic',
      };
      const W = 960, H = 430, LAT_MAX = 84, LAT_MIN = -56; // clip poles/Antarctica band
      const px = ([lon, lat]) => [
        (lon + 180) / 360 * W,
        (LAT_MAX - lat) / (LAT_MAX - LAT_MIN) * H,
      ];
      function ringPath(ring) {
        // Skip rings entirely outside the latitude window (far-north islands etc.)
        if (ring.every(([, lat]) => lat > LAT_MAX) || ring.every(([, lat]) => lat < LAT_MIN)) return '';
        // Start a new subpath on antimeridian jumps instead of drawing across the map
        let d = '', prevX = null;
        for (const c of ring) {
          const [x, y] = px(c);
          d += (prevX === null || Math.abs(x - prevX) > W / 2)
            ? `M${x.toFixed(1)},${y.toFixed(1)}`
            : `L${x.toFixed(1)},${y.toFixed(1)}`;
          prevX = x;
        }
        return d + 'Z';
      }
      function geomPath(geom) {
        const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
        return polys.map(rings => rings.map(ringPath).join('')).join('');
      }
      // Sequential one-hue ramp (dark -> bright = more challenges), validated on #242424
      // (ordinal checks pass: monotone L, ΔL >= .06, dark end 2.2:1 vs surface).
      function shade(count) {
        if (count >= 50) return '#00d084';
        if (count >= 5) return '#00915d';
        if (count >= 1) return '#14654a';
        return 'rgba(255,255,255,.05)';
      }

      async function renderWorld(rows) {
        const resp = await fetch('assets/countries-110m.json');
        if (!resp.ok) return;
        const topo = await resp.json();
        const fc = topojson.feature(topo, topo.objects.countries);

        const byName = {};
        for (const r of rows) {
          if (!isChallenge(r)) continue;
          const name = A2_NAME[r.country_code];
          if (!name) continue;
          const b = byName[name] || (byName[name] = { count: 0, wins: 0, losses: 0 });
          b.count += 1;
          if (r.result === 'success') b.wins += 1;
          if (r.result === 'failure') b.losses += 1;
        }

        const svg = document.getElementById('world');
        svg.innerHTML = fc.features
          .filter(f => f.properties.name !== 'Antarctica')
          .map((f, i) => {
            const stat = byName[f.properties.name];
            return `<path d="${geomPath(f.geometry)}" fill="${shade(stat ? stat.count : 0)}"
                      stroke="#ffffff1f" stroke-width="0.5" data-i="${i}"></path>`;
          }).join('');

        const feats = fc.features.filter(f => f.properties.name !== 'Antarctica');
        svg.addEventListener('mousemove', (e) => {
          const path = e.target.closest('path');
          if (!path) { BMF.tooltip.hide(); return; }
          const f = feats[Number(path.dataset.i)];
          const stat = byName[f.properties.name];
          BMF.tooltip.show(e, stat
            ? `<b>${esc(f.properties.name)}</b><br>${stat.count} challenge${stat.count === 1 ? '' : 's'} · <span style="color:var(--win-text)">${stat.wins}W</span>–<span style="color:var(--loss-text)">${stat.losses}L</span>`
            : `<b>${esc(f.properties.name)}</b><br>Not yet visited`);
        });
        svg.addEventListener('mouseleave', BMF.tooltip.hide);

        document.getElementById('worldCount').textContent =
          `— ${Object.keys(byName).length} countries conquered so far`;
      }

      /* ---- boot ---- */
      // Map key comes from assets/config.js (window.BMF_CONFIG.maptilerKey) —
      // client-visible by design, origin-restricted in the MapTiler dashboard.
      function bootMap() {
        const key = (((window.BMF_CONFIG || {}).maptilerKey) || '').trim();
        if (key && !/YOUR_MAPTILER_KEY|placeholder/i.test(key)) { initMap(key); return; }
        const el = document.getElementById('map');
        el.style.height = 'auto';
        el.innerHTML = '<div class="muted" style="padding:.25rem 0">Map tiles need a key in assets/config.js</div>';
        const legend = document.querySelector('.map-legend');
        if (legend) legend.style.display = 'none';
      }

      BMF.loadData().then(({ rows, features }) => {
        state.rows = rows;
        state.features = features;
        renderWorld(rows);
        bootMap();
      });
    </script>
  </body>
</html>
