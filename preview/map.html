<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BeardMeatsFood – Map &amp; Tours</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" />
    <link rel="stylesheet" href="assets/app.css" />
    <style>
      #map { width: 100%; height: 540px; border-radius: var(--bmf-radius-md); }
      .map-card { position: relative; }
      .map-legend { position: absolute; bottom: 26px; left: 26px; background: #fbf7eee6; color: var(--bmf-color-text); border: 1px solid var(--border); border-radius: var(--bmf-radius-md); box-shadow: var(--bmf-shadow-2); padding: var(--bmf-space-2) var(--bmf-space-3); display: flex; gap: var(--bmf-space-3); font-size: .75rem; }
      .controls { display: flex; gap: var(--bmf-space-3); align-items: center; flex-wrap: wrap; margin-bottom: var(--bmf-space-4); }
      .controls select { padding: .4rem .7rem; border-radius: var(--bmf-radius-md); border: 1px solid var(--bmf-color-border); background: var(--surface); color: var(--bmf-color-text); font-family: var(--bmf-font-sans); font-size: var(--bmf-font-size-100); max-width: 260px; }
      .scrubber { display: flex; gap: var(--bmf-space-2); align-items: center; flex: 1; min-width: 260px; }
      .scrubber input[type=range] { flex: 1; accent-color: var(--bmf-color-brand); }
      .scrubber .date { font-size: .8rem; color: var(--bmf-color-text-muted); min-width: 150px; text-align: right; font-variant-numeric: tabular-nums; }
      .playbtn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--bmf-color-border); background: var(--surface); color: var(--bmf-color-text); cursor: pointer; font-size: .8rem; }
      .playbtn.playing { background: var(--bmf-color-brand); color: var(--bmf-color-text-alt); border-color: var(--bmf-color-brand); }
      #world { width: 100%; height: auto; display: block; }
      .world-legend { display: flex; gap: var(--bmf-space-4); font-size: .75rem; color: var(--bmf-color-text-muted); margin-top: var(--bmf-space-2); flex-wrap: wrap; }
      .maplibregl-popup-content { background: var(--surface); color: var(--bmf-color-text); font-family: var(--bmf-font-sans); border-radius: 6px; box-shadow: var(--bmf-shadow-3); }
      .maplibregl-popup-anchor-bottom .maplibregl-popup-tip { border-top-color: var(--surface); }
      .maplibregl-popup-anchor-top .maplibregl-popup-tip { border-bottom-color: var(--surface); }
      .maplibregl-popup-anchor-left .maplibregl-popup-tip { border-right-color: var(--surface); }
      .maplibregl-popup-anchor-right .maplibregl-popup-tip { border-left-color: var(--surface); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Map &amp; Tours</h1>
      <div class="sub">Where the challenges happened — filter by trip, watch the career unfold in time.</div>

      <div class="controls" id="controls">
        <button class="fbtn active" data-filter="all">All</button>
        <button class="fbtn" data-filter="success">Wins</button>
        <button class="fbtn" data-filter="failure">Losses</button>
        <button class="fbtn" data-filter="unknown">Pending</button>
        <select id="trip" style="display:none"><option value="all">All challenges</option></select>
        <div class="scrubber">
          <button id="play" class="playbtn" title="Play through time">&#9654;</button>
          <input id="scrub" type="range" min="0" max="48" value="48" />
          <span class="date" id="scrubDate"></span>
        </div>
      </div>

      <div class="card map-card">
        <div id="map"></div>
        <div class="map-legend">
          <span class="chip"><span class="swatch" style="background:var(--win)"></span>Win</span>
          <span class="chip"><span class="swatch" style="background:var(--loss)"></span>Loss</span>
          <span class="chip"><span class="swatch" style="background:var(--unknown)"></span>Verdict pending</span>
        </div>
      </div>

      <div class="card">
        <h3>Countries visited <span class="muted" id="worldCount" style="font-weight:400"></span></h3>
        <svg id="world" viewBox="0 0 960 430" role="img" aria-label="World map shaded by number of challenges per country"></svg>
        <div class="world-legend">
          <span class="chip"><span class="swatch" style="background:#74b491"></span>1–4 challenges</span>
          <span class="chip"><span class="swatch" style="background:#3d8f63"></span>5–49</span>
          <span class="chip"><span class="swatch" style="background:#175934"></span>50+</span>
          <span class="chip"><span class="swatch" style="background:rgba(34,28,20,.06);border:1px solid rgba(34,28,20,.25)"></span>Not yet visited</span>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
    <script src="assets/config.js"></script>
    <script src="assets/app.js"></script>
    <script>
      BMF.nav('map');
      const { COLORS, esc, yt, cleanTitle } = BMF;
      const state = {
        features: [], rows: [], map: null,
        filter: 'all', trip: 'all',
        minT: 0, maxT: 0, cutoff: Infinity,
        playTimer: null,
      };
      const STEPS = 48;

      const dateOf = p => p.date_attempted ? Date.parse(p.date_attempted.slice(0, 10)) : null;

      function matches(p) {
        if (state.filter !== 'all' && (p.result || 'unknown') !== state.filter) return false;
        if (state.trip !== 'all' && p.trip_name !== state.trip) return false;
        const t = dateOf(p);
        if (t != null && t > state.cutoff) return false;
        return true;
      }

      function filteredFeatures() {
        return state.features.filter(f => matches(f.properties));
      }

      function routeGeojson(feats) {
        const pts = feats
          .filter(f => f.properties.date_attempted)
          .sort((a, b) => a.properties.date_attempted.localeCompare(b.properties.date_attempted))
          .map(f => f.geometry.coordinates);
        return {
          type: 'FeatureCollection',
          features: (state.trip !== 'all' && pts.length >= 2)
            ? [{ type: 'Feature', geometry: { type: 'LineString', coordinates: pts }, properties: {} }]
            : [],
        };
      }

      function applyFilters(fit = false) {
        if (!state.map || !state.map.getSource('challenges')) return;
        const feats = filteredFeatures();
        state.map.getSource('challenges').setData({ type: 'FeatureCollection', features: feats });
        state.map.getSource('trip-route').setData(routeGeojson(feats));
        if (fit && feats.length) {
          const lngs = feats.map(f => f.geometry.coordinates[0]);
          const lats = feats.map(f => f.geometry.coordinates[1]);
          state.map.fitBounds(
            [[Math.min(...lngs), Math.min(...lats)], [Math.max(...lngs), Math.max(...lats)]],
            { padding: 60, maxZoom: 9, duration: 800 }
          );
        }
      }

      function initMap(key) {
        const styleUrl = `https://api.maptiler.com/maps/streets-v2/style.json?key=${encodeURIComponent(key)}`;
        const map = new maplibregl.Map({ container: 'map', style: styleUrl, center: [-20, 40], zoom: 1.8 });
        state.map = map;
        map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');
        map.on('load', () => {
          map.addSource('challenges', {
            type: 'geojson',
            data: { type: 'FeatureCollection', features: filteredFeatures() },
            cluster: true, clusterRadius: 42, clusterMaxZoom: 9
          });
          map.addSource('trip-route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
          map.addLayer({ id: 'trip-route', type: 'line', source: 'trip-route', paint: {
            'line-color': '#9e2f23', 'line-width': 2, 'line-opacity': .75, 'line-dasharray': [2, 1.5]
          }});
          map.addLayer({ id: 'clusters', type: 'circle', source: 'challenges', filter: ['has', 'point_count'], paint: {
            'circle-color': '#6f6353', 'circle-opacity': .9,
            'circle-radius': ['step', ['get', 'point_count'], 14, 25, 20, 100, 26],
            'circle-stroke-width': 2, 'circle-stroke-color': '#fbf7ee'
          }});
          map.addLayer({ id: 'cluster-count', type: 'symbol', source: 'challenges', filter: ['has', 'point_count'],
            layout: { 'text-field': ['get', 'point_count_abbreviated'], 'text-size': 12 }, paint: { 'text-color': '#fbf7ee' }});
          map.addLayer({ id: 'points', type: 'circle', source: 'challenges', filter: ['!', ['has', 'point_count']], paint: {
            'circle-radius': 6,
            'circle-color': ['match', ['get', 'result'], 'success', COLORS.success, 'failure', COLORS.failure, COLORS.unknown],
            'circle-stroke-width': 1.5, 'circle-stroke-color': '#fbf7ee'
          }});
          map.on('click', 'clusters', async (e) => {
            const f = map.queryRenderedFeatures(e.point, { layers: ['clusters'] })[0];
            const zoom = await map.getSource('challenges').getClusterExpansionZoom(f.properties.cluster_id);
            map.easeTo({ center: f.geometry.coordinates, zoom });
          });
          map.on('click', 'points', (e) => {
            const f = e.features && e.features[0];
            if (!f) return;
            const p = f.properties;
            const label = p.result === 'success' ? 'WIN' : p.result === 'failure' ? 'LOSS' : 'VERDICT PENDING';
            const labelColor = p.result === 'success' ? 'var(--win-text)' : p.result === 'failure' ? 'var(--loss-text)' : 'var(--unknown-text)';
            new maplibregl.Popup({ closeButton: true }).setLngLat(e.lngLat).setHTML(`
              <div style="min-width:220px;max-width:280px">
                <div style="font-weight:700">${esc(p.restaurant || '')}</div>
                <div style="opacity:.7">${esc([p.city, BMF.countryName(p.country_code)].filter(Boolean).join(', '))}</div>
                <div style="margin:.3rem 0">${esc(cleanTitle(p.title))}</div>
                <div><b style="color:${labelColor}">${label}</b> · ${BMF.fmtDate(p.date_attempted)}${p.trip_name ? ' · ' + esc(p.trip_name) : ''}</div>
                <a href="${yt(p.video_id)}" target="_blank" rel="noopener">Watch on YouTube →</a>
              </div>`).addTo(map);
          });
          ['clusters', 'points'].forEach(l => {
            map.on('mouseenter', l, () => map.getCanvas().style.cursor = 'pointer');
            map.on('mouseleave', l, () => map.getCanvas().style.cursor = '');
          });
        });
      }

      /* ---- date scrubber ---- */
      const scrub = document.getElementById('scrub');
      const scrubDate = document.getElementById('scrubDate');
      const playBtn = document.getElementById('play');

      function cutoffForStep(step) {
        return state.minT + (state.maxT - state.minT) * (step / STEPS);
      }
      function setStep(step, fit = false) {
        scrub.value = step;
        state.cutoff = step >= STEPS ? Infinity : cutoffForStep(step);
        const shown = step >= STEPS ? state.maxT : state.cutoff;
        scrubDate.textContent = BMF.fmtDate(new Date(shown).toISOString());
        applyFilters(fit);
      }
      scrub.addEventListener('input', () => { stopPlay(); setStep(Number(scrub.value)); });

      function stopPlay() {
        if (state.playTimer) { clearInterval(state.playTimer); state.playTimer = null; playBtn.classList.remove('playing'); playBtn.innerHTML = '&#9654;'; }
      }
      playBtn.addEventListener('click', () => {
        if (state.playTimer) { stopPlay(); return; }
        let step = Number(scrub.value) >= STEPS ? 0 : Number(scrub.value);
        playBtn.classList.add('playing'); playBtn.innerHTML = '&#10074;&#10074;';
        state.playTimer = setInterval(() => {
          step += 1;
          setStep(step);
          if (step >= STEPS) stopPlay();
        }, 250);
        setStep(step);
      });

      /* ---- filters ---- */
      document.getElementById('controls').addEventListener('click', (e) => {
        const btn = e.target.closest('.fbtn[data-filter]');
        if (!btn) return;
        document.querySelectorAll('.fbtn[data-filter]').forEach(b => b.classList.toggle('active', b === btn));
        state.filter = btn.dataset.filter;
        applyFilters();
      });
      document.getElementById('trip').addEventListener('change', (e) => {
        state.trip = e.target.value;
        applyFilters(state.trip !== 'all');
      });

      /* ---- countries visited (SVG choropleth) ---- */
      const A2_NAME = {
        GB: 'United Kingdom', US: 'United States of America', IE: 'Ireland', DE: 'Germany',
        NL: 'Netherlands', BE: 'Belgium', FR: 'France', ES: 'Spain', IT: 'Italy', AT: 'Austria',
        CZ: 'Czechia', PL: 'Poland', SE: 'Sweden', CA: 'Canada', AU: 'Australia',
        NZ: 'New Zealand', AE: 'United Arab Emirates', SG: 'Singapore', TH: 'Thailand',
        CH: 'Switzerland', PT: 'Portugal', MX: 'Mexico', JP: 'Japan', DK: 'Denmark',
        NO: 'Norway', FI: 'Finland', IS: 'Iceland', DO: 'Dominican Republic',
      };
      const W = 960, H = 430, LAT_MAX = 84, LAT_MIN = -56; // clip poles/Antarctica band
      const px = ([lon, lat]) => [
        (lon + 180) / 360 * W,
        (LAT_MAX - lat) / (LAT_MAX - LAT_MIN) * H,
      ];
      function ringPath(ring) {
        // Skip rings entirely outside the latitude window (far-north islands etc.)
        if (ring.every(([, lat]) => lat > LAT_MAX) || ring.every(([, lat]) => lat < LAT_MIN)) return '';
        // Start a new subpath on antimeridian jumps instead of drawing across the map
        let d = '', prevX = null;
        for (const c of ring) {
          const [x, y] = px(c);
          d += (prevX === null || Math.abs(x - prevX) > W / 2)
            ? `M${x.toFixed(1)},${y.toFixed(1)}`
            : `L${x.toFixed(1)},${y.toFixed(1)}`;
          prevX = x;
        }
        return d + 'Z';
      }
      function geomPath(geom) {
        const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
        return polys.map(rings => rings.map(ringPath).join('')).join('');
      }
      // Sequential one-hue ramp (light -> dark = more challenges), validated on #fbf7ee.
      function shade(count) {
        if (count >= 50) return '#175934';
        if (count >= 5) return '#3d8f63';
        if (count >= 1) return '#74b491';
        return 'rgba(34,28,20,.06)';
      }

      async function renderWorld(rows) {
        const resp = await fetch('assets/countries-110m.json');
        if (!resp.ok) return;
        const topo = await resp.json();
        const fc = topojson.feature(topo, topo.objects.countries);

        const byName = {};
        for (const r of rows) {
          const name = A2_NAME[r.country_code];
          if (!name) continue;
          const b = byName[name] || (byName[name] = { count: 0, wins: 0, losses: 0 });
          b.count += 1;
          if (r.result === 'success') b.wins += 1;
          if (r.result === 'failure') b.losses += 1;
        }

        const svg = document.getElementById('world');
        svg.innerHTML = fc.features
          .filter(f => f.properties.name !== 'Antarctica')
          .map((f, i) => {
            const stat = byName[f.properties.name];
            return `<path d="${geomPath(f.geometry)}" fill="${shade(stat ? stat.count : 0)}"
                      stroke="rgba(34,28,20,.22)" stroke-width="0.5" data-i="${i}"></path>`;
          }).join('');

        const feats = fc.features.filter(f => f.properties.name !== 'Antarctica');
        svg.addEventListener('mousemove', (e) => {
          const path = e.target.closest('path');
          if (!path) { BMF.tooltip.hide(); return; }
          const f = feats[Number(path.dataset.i)];
          const stat = byName[f.properties.name];
          BMF.tooltip.show(e, stat
            ? `<b>${esc(f.properties.name)}</b><br>${stat.count} challenge${stat.count === 1 ? '' : 's'} · <span style="color:var(--win-text)">${stat.wins}W</span>–<span style="color:var(--loss-text)">${stat.losses}L</span>`
            : `<b>${esc(f.properties.name)}</b><br>Not yet visited`);
        });
        svg.addEventListener('mouseleave', BMF.tooltip.hide);

        document.getElementById('worldCount').textContent =
          `— ${Object.keys(byName).length} countries conquered so far`;
      }

      /* ---- boot ---- */
      // Map key comes from assets/config.js (window.BMF_CONFIG.maptilerKey) —
      // client-visible by design, origin-restricted in the MapTiler dashboard.
      function bootMap() {
        const key = (((window.BMF_CONFIG || {}).maptilerKey) || '').trim();
        if (key && !/YOUR_MAPTILER_KEY|placeholder/i.test(key)) { initMap(key); return; }
        const el = document.getElementById('map');
        el.style.height = 'auto';
        el.innerHTML = '<div class="muted" style="padding:.25rem 0">Map tiles need a key in assets/config.js</div>';
        const legend = document.querySelector('.map-legend');
        if (legend) legend.style.display = 'none';
      }

      BMF.loadData().then(({ rows, features }) => {
        state.rows = rows;
        state.features = features;

        const dates = features.map(f => dateOf(f.properties)).filter(Boolean);
        state.minT = Math.min(...dates);
        state.maxT = Math.max(...dates);
        setStep(STEPS);

        // trip dropdown (hidden when data predates trip_name)
        const tripSel = document.getElementById('trip');
        const firstDate = {};
        for (const f of features) {
          const t = f.properties.trip_name;
          if (!t) continue;
          const d = f.properties.date_attempted || '';
          if (!(t in firstDate) || d < firstDate[t]) firstDate[t] = d;
        }
        const trips = Object.keys(firstDate).sort((a, b) => firstDate[a].localeCompare(firstDate[b]));
        if (trips.length) {
          tripSel.style.display = '';
          tripSel.insertAdjacentHTML('beforeend',
            trips.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join(''));
        }

        renderWorld(rows);
        bootMap();
      });
    </script>
  </body>
</html>
