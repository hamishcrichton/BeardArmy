<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BeardMeatsFood – Overview</title>
    <meta name="description" content="Every BeardMeatsFood restaurant challenge, weighed, located and logged - the tale of the tape: 644 wins, 65 losses across 18 countries." />
    <meta property="og:site_name" content="BeardMeatsFood Challenge Stats (fan site)" />
    <meta property="og:title" content="BeardMeatsFood – Overview" />
    <meta property="og:description" content="Every BeardMeatsFood restaurant challenge, weighed, located and logged - the tale of the tape: 644 wins, 65 losses across 18 countries." />
    <meta property="og:image" content="https://i.ytimg.com/vi/EAksgSSbJh0/maxresdefault.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,400&display=swap" />
    <link rel="stylesheet" href="assets/app.css" />
    <style>
      /* ---- Hero — big stacked wordmark, then photo + scorecard ("Tale of the Tape") ---- */
      .tape { padding: var(--bmf-space-4) 0 var(--bmf-space-8); margin-bottom: var(--bmf-space-6);
              border-bottom: 1px solid rgba(255,255,255,.16); }
      .tape-title { text-align: center; font-family: var(--bmf-font-display); font-weight: 700;
                    font-size: clamp(4rem, 14vw, 11rem); line-height: .78; margin: 0 0 .14em;
                    text-transform: uppercase; letter-spacing: .01em; }
      .tape-title span { display: block; }
      .tape-title .m { color: var(--bmf-color-brand); }
      .tape-sub { text-align: center; color: var(--bmf-color-text-muted);
                  margin: 0 0 var(--bmf-space-8); font-size: var(--bmf-font-size-200);
                  letter-spacing: .02em; }
      .tape-grid { display: grid; grid-template-columns: minmax(260px, 6fr) minmax(300px, 7fr);
                   gap: clamp(20px, 4vw, 56px); align-items: center; }
      .tape-photo { width: 100%; max-width: 460px; justify-self: center; }
      .tape-photo .snap { transform: rotate(-2.2deg); }
      /* fixed crop window into the 16:9 thumbnail (visually tuned; adjust here) */
      .tape-photo .crop { display: block; position: relative; overflow: hidden; aspect-ratio: 4 / 5; }
      .tape-photo .crop img { position: absolute; max-width: none; aspect-ratio: auto;
                              width: 270.3%; left: -85.1%; top: 0; }
      .tape-scorecard-eyebrow { font-size: .72rem; font-weight: 700; letter-spacing: .3em;
                                text-transform: uppercase; color: var(--bmf-color-brand);
                                margin-bottom: var(--bmf-space-3); }
      .tape-rows .ledger-row { padding: .42rem 0; border-bottom: 1px solid rgba(255,255,255,.08); }
      .tape-rows .ledger-row:last-child { border-bottom: 0; }
      .tape-rows .lr-value { font-size: clamp(1.4rem, 3.4vw, 1.9rem); }
      .tape-rows .lr-value .w { color: var(--win-text); }
      .tape-rows .lr-value .l { color: var(--loss-text); }
      .tape-rows .note { font-size: .75rem; color: var(--bmf-color-text-muted); padding-top: .55rem; }
      @media (max-width: 760px) {
        .tape-grid { grid-template-columns: 1fr; }
        .tape-photo { max-width: 320px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="tape">
        <h1 class="tape-title"><span>Beard</span><span class="m">Meats</span><span>Food</span></h1>
        <p class="tape-sub">Every Challenge. Every Bite.</p>
        <div class="tape-grid">
          <div class="tape-photo">
            <div class="snap"><span class="crop"><img src="https://i.ytimg.com/vi/EAksgSSbJh0/maxresdefault.jpg"
              onerror="this.onerror=null;this.src='https://i.ytimg.com/vi/EAksgSSbJh0/hqdefault.jpg'"
              alt="Adam Moran, hands behind head, sizing up a giant burger" /></span>
              <span class="cap">The UK's hairiest competitive eater.</span>
            </div>
          </div>
          <div class="tape-scorecard">
            <div class="tape-scorecard-eyebrow">Tale of the tape · est. 2015</div>
            <div class="tape-rows" id="tapeRows"></div>
          </div>
        </div>
      </section>
    </div>

    <script src="assets/app.js"></script>
    <script>
      const { isChallenge, maxBy } = BMF;

      /* ---- Tale of the tape / scorecard (true challenges only; stats already exclude specials).
              The six data rows compute live from table.json and refresh with the nightly data
              commit; Age / Provenance / Catchphrase are static bio facts with no data field. ---- */
      function renderTape(rows, s) {
        const ch = rows.filter(isChallenge);
        const specialsN = rows.length - ch.length;
        const rate = s.wins + s.losses ? (100 * s.wins / (s.wins + s.losses)).toFixed(1) : '–';
        const heaviest = maxBy(ch, r => r.weight_lb);
        const items = [
          ['Challenges', s.total],
          ['Record', `<span class="w">${s.wins}</span>–<span class="l">${s.losses}</span>`],
          ['Win Rate', `${rate}%`],
          ['Countries Visited', s.countries],
          ['Heaviest', heaviest ? `${heaviest.weight_lb} lb` : '–'],
          ['Longest Streak', `${s.longest} wins`],
          ['Age', '40'],
          ['Provenance', 'Yorkshire'],
          ['Catchphrase', 'Let’s Get It'],
        ];
        document.getElementById('tapeRows').innerHTML = items.map(([label, value]) => `
          <div class="ledger-row">
            <span class="lr-label">${label}</span><span class="lr-dots"></span>
            <span class="lr-value">${value}</span>
          </div>`).join('') + (specialsN ? `
          <div class="note">+ ${specialsN} specials — cheat days, Q&amp;As, tours &amp; music videos, not counted above.</div>` : '');
      }

      /* ---- boot ---- */
      BMF.nav('index');
      BMF.loadData().then(({ rows, stats }) => {
        renderTape(rows, stats);
      }).catch(() => {
        document.getElementById('tapeRows').innerHTML =
          '<div class="muted" style="padding:1rem 0">Could not load published data — run the publish step and serve the repo root.</div>';
      });
    </script>
  </body>
</html>
